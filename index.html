<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Генератор Изображений</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>ImageGen AI</span>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Генератор изображений с ИИ</h1>
            <p>Опишите изображение, которое вы хотите создать, и нажмите "Сгенерировать"</p>
        </section>

        <section class="generator">
            <div class="input-group">
                <textarea 
                    id="prompt" 
                    placeholder="Опишите изображение... Например: 'Космический корабль летит над неоновым городом в стиле киберпанк'"
                    rows="3"
                ></textarea>
                <button id="generate-btn" onclick="generateImage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    Сгенерировать
                </button>
            </div>

            <div class="options">
                <label class="option">
                    <input type="radio" name="style" value="realistic" checked>
                    <span>Реалистичный</span>
                </label>
                <label class="option">
                    <input type="radio" name="style" value="anime">
                    <span>Аниме</span>
                </label>
                <label class="option">
                    <input type="radio" name="style" value="digital-art">
                    <span>Цифровой арт</span>
                </label>
                <label class="option">
                    <input type="radio" name="style" value="oil-painting">
                    <span>Маслом</span>
                </label>
                <label class="option">
                    <input type="radio" name="style" value="3d">
                    <span>3D</span>
                </label>
            </div>

            <div class="size-select">
                <label>Размер:</label>
                <select id="size">
                    <option value="512x512">512x512</option>
                    <option value="768x768" selected>768x768</option>
                    <option value="1024x1024">1024x1024</option>
                    <option value="1024x768">1024x768 (Ландшафт)</option>
                    <option value="768x1024">768x1024 (Портрет)</option>
                </select>
            </div>
        </section>

        <section class="gallery" id="gallery">
            <h2>Ваши изображения</h2>
            <div class="gallery-grid" id="gallery-grid">
                <div class="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <p>Здесь появятся ваши изображения</p>
                </div>
            </div>
        </section>

        <section class="history" id="history" style="display: none;">
            <h2>История генераций</h2>
            <div class="history-list" id="history-list"></div>
        </section>
    </main>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img id="modal-image" src="" alt="Увеличенное изображение">
            <div class="modal-info">
                <p id="modal-prompt"></p>
                <button class="download-btn" onclick="downloadImage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Скачать
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
